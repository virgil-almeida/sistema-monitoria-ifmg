{% extends "base.html" %}

{% block title %}Página não encontrada{% endblock %}
{% block breadcrumb %}<li class="breadcrumb-item active">404</li>{% endblock %}
{% block h1 %}Erro 404{% endblock %}

{% block content %}

    <h2 class="headline text-warning">404</h2>
    <div class="error-content">
      <h3><i class="fas fa-triangle-exclamation text-warning"></i> Oops! Página não encontrada.</h3>
      <p>Não encontramos o que você procurava.</p>
    </div>
  </div>
{% endblock %}
